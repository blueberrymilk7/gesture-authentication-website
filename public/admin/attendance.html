<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage Attendance — School Portal Admin">
  <title>Attendance — School Portal Admin</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="app-layout admin-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🏫</div>
        <div>
          <h2>School Portal</h2>
          <span>Admin Panel</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/students.html" class="nav-link"><span class="nav-icon">👨‍🎓</span> Students</a>
        <a href="/admin/announcements.html" class="nav-link"><span class="nav-icon">📢</span> Announcements</a>
        <a href="/admin/grades.html" class="nav-link"><span class="nav-icon">📝</span> Grades</a>
        <a href="/admin/attendance.html" class="nav-link active"><span class="nav-icon">📅</span> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="name" id="userName">Admin</div>
            <div class="role">Administrator</div>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <h1>Attendance Management</h1>
        <p>Mark and view student attendance records.</p>
      </div>

      <!-- Mark Attendance -->
      <div class="card" style="margin-bottom: var(--space-8);">
        <div class="card-header">
          <h2 class="card-title">Mark Attendance</h2>
        </div>
        <form id="attendanceForm">
          <div class="form-row">
            <div class="form-group">
              <label for="attStudent">Student</label>
              <select id="attStudent" class="form-control" required>
                <option value="">Select student</option>
              </select>
            </div>
            <div class="form-group">
              <label for="attDate">Date</label>
              <input type="date" id="attDate" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label for="attStatus">Status</label>
            <select id="attStatus" class="form-control" required>
              <option value="">Select status</option>
              <option value="present">✅ Present</option>
              <option value="absent">❌ Absent</option>
              <option value="late">⏰ Late</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">📅 Mark Attendance</button>
        </form>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <select id="filterStudent" class="form-control">
          <option value="">All Students</option>
        </select>
        <input type="date" id="filterDate" class="form-control" placeholder="Filter by date">
      </div>

      <!-- Attendance Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Student ID</th>
              <th>Class</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendanceTableBody">
            <tr><td colspan="5"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/admin-attendance.js"></script>
</body>
</html>

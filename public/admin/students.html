<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage Students — School Portal Admin">
  <title>Students — School Portal Admin</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="app-layout admin-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🏫</div>
        <div>
          <h2>School Portal</h2>
          <span>Admin Panel</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/students.html" class="nav-link active"><span class="nav-icon">👨‍🎓</span> Students</a>
        <a href="/admin/announcements.html" class="nav-link"><span class="nav-icon">📢</span> Announcements</a>
        <a href="/admin/grades.html" class="nav-link"><span class="nav-icon">📝</span> Grades</a>
        <a href="/admin/attendance.html" class="nav-link"><span class="nav-icon">📅</span> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="name" id="userName">Admin</div>
            <div class="role">Administrator</div>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <h1>Student Management</h1>
        <p>Add, edit, and manage student accounts.</p>
      </div>

      <!-- Actions -->
      <div style="margin-bottom: var(--space-6);">
        <button class="btn btn-primary" id="addStudentBtn">➕ Add New Student</button>
      </div>

      <!-- Students Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Student ID</th>
              <th>Email</th>
              <th>Grade/Class</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            <tr><td colspan="6"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Student Modal -->
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Student</h3>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <form id="studentForm">
        <input type="hidden" id="editStudentId">
        <div class="form-group">
          <label for="studentName">Full Name</label>
          <input type="text" id="studentName" class="form-control" placeholder="e.g. John Smith" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="studentEmail">Email</label>
            <input type="email" id="studentEmail" class="form-control" placeholder="john@school.com" required>
          </div>
          <div class="form-group">
            <label for="studentIdInput">Student ID</label>
            <input type="text" id="studentIdInput" class="form-control" placeholder="e.g. STU004" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="studentGrade">Grade/Class</label>
            <select id="studentGrade" class="form-control" required>
              <option value="">Select grade</option>
              <option value="9-A">9-A</option>
              <option value="9-B">9-B</option>
              <option value="10-A">10-A</option>
              <option value="10-B">10-B</option>
              <option value="11-A">11-A</option>
              <option value="11-B">11-B</option>
              <option value="12-A">12-A</option>
              <option value="12-B">12-B</option>
            </select>
          </div>
          <div class="form-group">
            <label for="studentPassword">Password</label>
            <input type="password" id="studentPassword" class="form-control" placeholder="Min 6 characters">
          </div>
        </div>
        <div style="display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-4);">
          <button type="button" class="btn btn-secondary" id="cancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitStudent">Save Student</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/admin-students.js"></script>
</body>
</html>

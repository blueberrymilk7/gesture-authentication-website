<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="School Portal — Login for administrators and students">
  <title>School Portal — Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <h1>🎓 School Portal</h1>
        <p>Sign in to your account</p>
      </div>

      <div id="alert" class="alert" style="display:none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@school.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert');
    const loginBtn = document.getElementById('loginBtn');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-' + type;
      alertBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      loginBtn.innerHTML = '<span class="spinner"></span>';
      loginBtn.disabled = true;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Login failed', 'error');
          loginBtn.textContent = 'Sign In';
          loginBtn.disabled = false;
          return;
        }

        window.location.href = data.role === 'admin' ? '/admin-dashboard.html' : '/student-dashboard.html';
      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

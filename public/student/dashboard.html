<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Dashboard — School Portal">
  <title>My Dashboard — School Portal</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/student.css">
</head>
<body>
  <div class="app-layout student-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🏫</div>
        <div>
          <h2>School Portal</h2>
          <span>Student</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/student/dashboard.html" class="nav-link active"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="/student/grades.html" class="nav-link"><span class="nav-icon">📝</span> My Grades</a>
        <a href="/student/attendance.html" class="nav-link"><span class="nav-icon">📅</span> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">S</div>
          <div class="user-details">
            <div class="name" id="userName">Student</div>
            <div class="role">Student</div>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <h1 id="welcomeTitle">Welcome back!</h1>
        <p>Here's your academic overview.</p>
      </div>

      <!-- Profile Card -->
      <div class="profile-card" id="profileCard">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">S</div>
          <div class="profile-info">
            <h2 id="profileName">Loading...</h2>
            <div class="student-id-text" id="profileStudentId">—</div>
          </div>
        </div>
        <div class="profile-details">
          <div class="detail-item">
            <div class="detail-label">Email</div>
            <div class="detail-value" id="profileEmail">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Grade / Class</div>
            <div class="detail-value" id="profileGrade">—</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Member Since</div>
            <div class="detail-value" id="profileJoined">—</div>
          </div>
        </div>
      </div>

      <!-- Enrolled Subjects -->
      <div class="card" style="margin-bottom: var(--space-8);">
        <div class="card-header">
          <h2 class="card-title">Enrolled Subjects</h2>
        </div>
        <div class="subjects-grid" id="subjectsGrid">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Recent Announcements -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📢 Announcements</h2>
        </div>
        <div class="announcement-list" id="announcementsList">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/student-dashboard.js"></script>
</body>
</html>

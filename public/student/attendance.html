<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Attendance — School Portal">
  <title>My Attendance — School Portal</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/student.css">
</head>
<body>
  <div class="app-layout student-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🏫</div>
        <div>
          <h2>School Portal</h2>
          <span>Student</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/student/dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="/student/grades.html" class="nav-link"><span class="nav-icon">📝</span> My Grades</a>
        <a href="/student/attendance.html" class="nav-link active"><span class="nav-icon">📅</span> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">S</div>
          <div class="user-details">
            <div class="name" id="userName">Student</div>
            <div class="role">Student</div>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <h1>My Attendance</h1>
        <p>Track your attendance record throughout the term.</p>
      </div>

      <!-- Attendance Summary -->
      <div class="stats-grid">
        <div class="stat-card attendance-stat">
          <div class="stat-icon">📊</div>
          <div class="stat-value" id="attendanceRate">—</div>
          <div class="stat-label">Attendance Rate</div>
        </div>
        <div class="stat-card profile-stat">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="presentCount">—</div>
          <div class="stat-label">Present</div>
        </div>
        <div class="stat-card announcements-stat">
          <div class="stat-icon">⏰</div>
          <div class="stat-value" id="lateCount">—</div>
          <div class="stat-label">Late</div>
        </div>
        <div class="stat-card" style="border-left: 3px solid #f87171; background: rgba(30,41,59,0.6);">
          <div class="stat-icon" style="background: rgba(239,68,68,0.15); color: #f87171;">❌</div>
          <div class="stat-value" id="absentCount">—</div>
          <div class="stat-label">Absent</div>
        </div>
      </div>

      <!-- Attendance Calendar -->
      <div class="card" style="margin-bottom: var(--space-8);">
        <div class="card-header">
          <h2 class="card-title">Attendance Calendar</h2>
        </div>
        <div class="attendance-grid" id="attendanceGrid">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Attendance Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Day</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendanceTableBody">
            <tr><td colspan="3"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/student-attendance.js"></script>
</body>
</html>

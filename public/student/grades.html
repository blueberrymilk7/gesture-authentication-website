<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Grades — School Portal">
  <title>My Grades — School Portal</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/student.css">
</head>
<body>
  <div class="app-layout student-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🏫</div>
        <div>
          <h2>School Portal</h2>
          <span>Student</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/student/dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="/student/grades.html" class="nav-link active"><span class="nav-icon">📝</span> My Grades</a>
        <a href="/student/attendance.html" class="nav-link"><span class="nav-icon">📅</span> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">S</div>
          <div class="user-details">
            <div class="name" id="userName">Student</div>
            <div class="role">Student</div>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <h1>My Grades</h1>
        <p>View your academic performance across all subjects.</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="gradeStats">
        <div class="stat-card grades-stat">
          <div class="stat-icon">📊</div>
          <div class="stat-value" id="avgScore">—</div>
          <div class="stat-label">Average Score</div>
        </div>
        <div class="stat-card profile-stat">
          <div class="stat-icon">🏆</div>
          <div class="stat-value" id="highestScore">—</div>
          <div class="stat-label">Highest Score</div>
        </div>
        <div class="stat-card attendance-stat">
          <div class="stat-icon">📚</div>
          <div class="stat-value" id="totalSubjects">—</div>
          <div class="stat-label">Subjects</div>
        </div>
      </div>

      <!-- Grades Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Subject</th>
              <th>Code</th>
              <th>Score</th>
              <th>Grade</th>
              <th>Term</th>
            </tr>
          </thead>
          <tbody id="gradesTableBody">
            <tr><td colspan="5"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/student-grades.js"></script>
</body>
</html>
